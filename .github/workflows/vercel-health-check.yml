name: Vercel Health Check

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Deployment URL to check (without trailing slash)
        required: true
        type: string

jobs:
  health:
    name: GET /health
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deployment URL
        id: deployment
        run: |
          if [ -n "${{ github.event.inputs.deployment_url }}" ]; then
            echo "url=${{ github.event.inputs.deployment_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ github.event.client_payload.url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check /health
        id: check
        run: |
          set -euo pipefail
          BASE="${{ steps.deployment.outputs.url }}"
          echo "Checking ${BASE}/health"

          BODY_FILE="$(mktemp)"
          HTTP_CODE=$(curl -sS --max-time 30 -o "$BODY_FILE" -w "%{http_code}" "${BASE}/health")
          echo "HTTP ${HTTP_CODE}"
          cat "$BODY_FILE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected HTTP 200"
            exit 1
          fi

          jq -e '.status == "ok" and .database.ok == true' "$BODY_FILE" > /dev/null

      - name: Report check status to Vercel
        if: always() && github.event_name == 'repository_dispatch'
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - PROXY: health