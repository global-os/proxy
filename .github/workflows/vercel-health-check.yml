name: Vercel Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Deployment URL to check (without trailing slash)
        required: false
        type: string

permissions:
  checks: write

jobs:
  health:
    name: "Vercel - PROXY: health"
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve deployment URL
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.deployment_url }}" ]; then
            RAW="${{ github.event.inputs.deployment_url }}"
            [[ "$RAW" == https://* ]] || RAW="https://${RAW}"
            echo "url=$RAW" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Looking up Vercel deployment for SHA ${{ github.sha }}..."

          for i in $(seq 1 24); do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=prj_YzDbpigPcAjP3uOJc6OiU0jmdopH&teamId=team_xx5yJzNru2p4zBytKd4iyRQ1&limit=10")

            URL=$(echo "$RESPONSE" | jq -r \
              '.deployments[] | select(.meta.githubCommitSha == "${{ github.sha }}") | .url' \
              | head -1)

            if [ -n "$URL" ] && [ "$URL" != "null" ]; then
              STATE=$(echo "$RESPONSE" | jq -r \
                '.deployments[] | select(.url == "'"$URL"'") | .state' \
                | head -1)
              echo "Attempt $i: found $URL (state: $STATE)"

              if [ "$STATE" = "READY" ]; then
                echo "url=https://$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            else
              echo "Attempt $i: no deployment found yet..."
            fi

            [ "$i" -lt 24 ] && sleep 15
          done

          echo "Timed out waiting for Vercel deployment to be ready"
          exit 1

      - name: Check /health
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          BASE="${{ steps.deployment.outputs.url }}"
          echo "Checking ${BASE}/health"

          for i in $(seq 1 12); do
            BODY=$(vercel curl "${BASE}/health" 2>/dev/null || true)
            if [[ "$BODY" == \<* ]]; then
              echo "Attempt ${i}: (HTML response)"
            else
              echo "Attempt ${i}: ${BODY}"
            fi

            if echo "$BODY" | jq -e '.status == "ok" and .database.ok == true' > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi

            [ "$i" -lt 12 ] && echo "Retrying in 10s..." && sleep 10
          done

          echo "Health check failed after 12 attempts"
          exit 1

      - name: Report check
        if: always() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Vercel - PROXY: health',
              head_sha: context.sha,
              status: 'completed',
              conclusion: '${{ steps.check.outcome }}' === 'success' ? 'success' : 'failure',
              output: {
                title: 'Health Check',
                summary: '${{ steps.check.outcome }}' === 'success'
                  ? '/health ok on ${{ steps.deployment.outputs.url }}'
                  : '/health failed on ${{ steps.deployment.outputs.url }}',
              }
            });
