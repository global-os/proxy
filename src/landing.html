<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobalOS — Your workspace. Anywhere globally.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="px-8 py-6 flex items-center justify-between max-w-6xl mx-auto w-full relative z-10">
    <span class="text-lg font-semibold tracking-tight" style="border-bottom: 2px solid #a855f7; padding-bottom: 1px;">GlobalOS</span>
    <a
      href="https://app.app.onetrueos.com"
      class="text-sm text-slate-400 hover:text-white transition-colors"
    >Sign in →</a>
  </nav>

  <!-- Hero -->
  <main class="flex-1 flex flex-col items-center justify-center text-center px-6 -mt-16">
    <h1 class="text-5xl sm:text-6xl md:text-7xl font-bold tracking-tight leading-tight max-w-3xl">
      Your workspace.<br />Anywhere globally.
    </h1>

    <p class="mt-8 text-xl sm:text-2xl text-slate-400 font-light">
      Run tasks, access your documents, from
      <span id="rotating-mount"></span>
    </p>

    <a
      href="https://app.app.onetrueos.com"
      class="mt-12 inline-block bg-white text-slate-950 font-semibold px-8 py-4 rounded-full text-base hover:bg-slate-100 transition-colors"
    >
      Get started
    </a>
  </main>

  <!-- Footer -->
  <footer class="px-8 py-6 text-center text-sm">
    <p class="text-slate-700/80 text-xs mb-2"><!-- GLOBALOS_VERSION --></p>
    <p class="text-slate-600">© 2026 Cold Air Networks</p>
  </footer>

  <script src="/www-assets/rotating.js"></script>
</body>
</html>
