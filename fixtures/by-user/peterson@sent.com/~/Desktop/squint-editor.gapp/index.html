<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squint Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, sans-serif;
    background: #fff;
    color: #111;
    display: flex;
    flex-direction: column;
    padding: 0.75rem;
    gap: 0.5rem;
  }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
  }
  #filename {
    flex: 1;
    min-width: 0;
    font-family: monospace;
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
  }
  #filename:focus { border-color: #888; }
  button {
    padding: 6px 14px;
    font-size: 13px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #f5f5f5; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  textarea {
    flex: 1;
    min-height: 0;
    width: 100%;
    resize: none;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
  }
  textarea:focus { border-color: #888; }
  #statusbar { font-size: 12px; color: #888; min-height: 1.2em; }
  #statusbar.error { color: #b91c1c; }
</style>
</head>
<body>
  <div class="toolbar">
    <input id="filename" type="text" spellcheck="false" value="Untitled.txt" aria-label="Desktop filename">
    <button id="save-btn" type="button">Save</button>
  </div>
  <textarea id="editor" spellcheck="false"></textarea>
  <div id="statusbar"></div>
  <script src="yjs.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
