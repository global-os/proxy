<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0f0f0f; }
    #root { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #webview-frame { width: 100%; height: 100%; border: none; display: none; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #loading svg { width: 48px; height: 36px; }
    #loading-msg { color: #aaa; font: 13px/1.5 Roboto, -apple-system, sans-serif; }
    #error-msg { color: #ff4444; font: 13px/1.5 Roboto, -apple-system, sans-serif; display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <svg viewBox="0 0 48 36" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="36" rx="8" fill="#FF0000"/>
        <polygon points="19,10 35,18 19,26" fill="#fff"/>
      </svg>
      <span id="loading-msg">Connecting to YouTube…</span>
      <span id="error-msg"></span>
    </div>
    <iframe id="webview-frame" title="YouTube" allow="autoplay; clipboard-read; clipboard-write; fullscreen"></iframe>
  </div>
  <script src="messaging.js"></script>
  <script src="app.js"></script>
</body>
</html>
