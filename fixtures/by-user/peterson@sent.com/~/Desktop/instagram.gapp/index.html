<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; }
    #root { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #webview-frame { width: 100%; height: 100%; border: none; display: none; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #loading svg { width: 48px; height: 48px; }
    #loading-msg { color: #a8a8a8; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #error-msg { color: #ed4956; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FED373"/>
            <stop offset="25%" stop-color="#F15245"/>
            <stop offset="50%" stop-color="#D92E7F"/>
            <stop offset="75%" stop-color="#9B36B7"/>
            <stop offset="100%" stop-color="#515BD4"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="url(#ig)" stroke-width="1.8" fill="none"/>
        <circle cx="12" cy="12" r="4.2" stroke="url(#ig)" stroke-width="1.8" fill="none"/>
        <circle cx="17.2" cy="6.8" r="1" fill="url(#ig)"/>
      </svg>
      <span id="loading-msg">Connecting to Instagram…</span>
      <span id="error-msg"></span>
    </div>
    <iframe id="webview-frame" title="Instagram" allow="autoplay; clipboard-read; clipboard-write"></iframe>
  </div>
  <script src="messaging.js"></script>
  <script src="app.js"></script>
</body>
</html>
