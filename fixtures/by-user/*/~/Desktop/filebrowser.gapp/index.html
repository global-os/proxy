<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body, #root {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: Tahoma, "MS Sans Serif", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    font-size: 12px;
    color: #000;
    background: #c0c0c0;
  }

  #root {
    height: 100%;
  }

  .shell {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 4px;
    min-height: 0;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
    margin-bottom: 4px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    flex: 0 0 auto;
  }

  button {
    font: inherit;
    padding: 4px 10px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    cursor: default;
    min-height: 24px;
  }

  button:active:not(:disabled) {
    border-color: #808080 #fff #fff #808080;
    padding-top: 5px;
    padding-left: 11px;
    padding-bottom: 3px;
    padding-right: 9px;
  }

  button:disabled {
    color: #808080;
  }

  .pathbar {
    flex: 1 1 auto;
    min-width: 0;
    padding: 4px 8px;
    background: #fff;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .panel {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    overflow: hidden;
  }

  .list-head, .list-row {
    display: grid;
    grid-template-columns: 28px 1fr 72px;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
  }

  .list-head {
    background: #c0c0c0;
    border-bottom: 1px solid #808080;
    font-weight: 700;
    flex: 0 0 auto;
  }

  .list-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
  }

  .list-row {
    cursor: default;
    user-select: none;
    border-bottom: 1px solid #ececec;
  }

  .list-row:hover:not(.selected) {
    background: #d8e8ff;
  }

  .list-row.selected {
    background: #000080;
    color: #fff;
  }

  .icon {
    text-align: center;
    font-size: 14px;
    line-height: 1;
  }

  .kind {
    color: inherit;
    opacity: 0.75;
    font-size: 11px;
  }

  .statusbar {
    flex: 0 0 auto;
    margin-top: 4px;
    padding: 3px 6px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #808080 #fff #fff #808080;
    min-height: 22px;
    color: #000;
  }

  .statusbar.error { color: #800000; }

  .empty {
    padding: 24px;
    text-align: center;
    color: #666;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{
  "imports": {
    "preact": "./preact.mjs",
    "preact/hooks": "./hooks.mjs"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
