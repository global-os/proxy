<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Field</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  .hud {
    position: fixed;
    left: 14px;
    bottom: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    line-height: 1.55;
    color: rgba(220, 235, 255, 0.92);
    background: rgba(8, 12, 22, 0.72);
    border: 1px solid rgba(120, 180, 255, 0.22);
    border-radius: 10px;
    padding: 10px 12px;
    backdrop-filter: blur(8px);
    pointer-events: none;
    min-width: 200px;
  }
  .hud strong {
    display: block;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #7dd3fc;
    margin-bottom: 4px;
  }
  .hud .dim { color: rgba(180, 200, 230, 0.55); }
  .title {
    position: fixed;
    top: 14px;
    left: 14px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: rgba(240, 248, 255, 0.88);
    text-shadow: 0 0 24px rgba(56, 189, 248, 0.35);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="title">vx · vy flow</div>
<div class="hud" id="hud">
  <strong>Velocity</strong>
  <div>vx <span id="vx">—</span></div>
  <div>vy <span id="vy">—</span></div>
  <div>|v| <span id="speed">—</span></div>
  <div class="dim" id="hint">Move pointer to probe the field</div>
</div>
<script>
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d', { alpha: false })
const $vx = document.getElementById('vx')
const $vy = document.getElementById('vy')
const $speed = document.getElementById('speed')
const $hint = document.getElementById('hint')

const TAU = Math.PI * 2
const FIELD_SCALE = 0.0045
const PARTICLE_COUNT = 2800
const TRAIL_ALPHA = 0.14

let width = 0
let height = 0
let dpr = 1
let time = 0
let pointer = { x: -1000, y: -1000, active: false }

/** Smooth divergence-free-ish field: vx, vy from position + time. */
function fieldAt(x, y, t) {
  const nx = x * FIELD_SCALE
  const ny = y * FIELD_SCALE
  const a = Math.sin(nx * 1.3 + t * 0.55) + Math.cos(ny * 0.9 - t * 0.35)
  const b = Math.cos(nx * 0.8 - t * 0.42) - Math.sin(ny * 1.1 + t * 0.5)
  const vx = Math.sin(a) * 1.15 + Math.cos(b) * 0.55
  const vy = Math.cos(a) * 1.15 - Math.sin(b) * 0.55
  return { vx, vy }
}

function speedOf(vx, vy) {
  return Math.hypot(vx, vy)
}

function hueFromVelocity(vx, vy) {
  return ((Math.atan2(vy, vx) / TAU) + 0.5) * 360
}

const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
  x: Math.random(),
  y: Math.random(),
  life: Math.random(),
}))

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2)
  width = window.innerWidth
  height = window.innerHeight
  canvas.width = Math.floor(width * dpr)
  canvas.height = Math.floor(height * dpr)
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
}

function spawnParticle(p) {
  p.x = Math.random()
  p.y = Math.random()
  p.life = 1
}

function stepParticle(p, dt) {
  const px = p.x * width
  const py = p.y * height
  const { vx, vy } = fieldAt(px, py, time)
  const speed = speedOf(vx, vy)
  const step = (0.35 + speed * 0.12) * dt

  p.x += (vx * step) / width
  p.y += (vy * step) / height
  p.life -= dt * (0.08 + speed * 0.04)

  if (
    p.life <= 0
    || p.x < -0.02 || p.x > 1.02
    || p.y < -0.02 || p.y > 1.02
  ) {
    spawnParticle(p)
  }
}

function drawParticle(p) {
  const px = p.x * width
  const py = p.y * height
  const { vx, vy } = fieldAt(px, py, time)
  const speed = speedOf(vx, vy)
  const hue = hueFromVelocity(vx, vy)
  const alpha = Math.min(0.85, 0.25 + speed * 0.18) * p.life

  ctx.strokeStyle = `hsla(${hue}, 88%, 68%, ${alpha})`
  ctx.lineWidth = 1.1 + speed * 0.35
  ctx.beginPath()
  ctx.moveTo(px, py)
  ctx.lineTo(px - vx * 7, py - vy * 7)
  ctx.stroke()
}

function drawPointerArrow() {
  if (!pointer.active) return

  const { vx, vy } = fieldAt(pointer.x, pointer.y, time)
  const speed = speedOf(vx, vy)
  const hue = hueFromVelocity(vx, vy)
  const len = 18 + speed * 14
  const nx = vx / (speed || 1)
  const ny = vy / (speed || 1)
  const x0 = pointer.x
  const y0 = pointer.y
  const x1 = x0 + nx * len
  const y1 = y0 + ny * len

  ctx.save()
  ctx.shadowColor = `hsl(${hue}, 90%, 60%)`
  ctx.shadowBlur = 12
  ctx.strokeStyle = `hsla(${hue}, 95%, 72%, 0.95)`
  ctx.fillStyle = ctx.strokeStyle
  ctx.lineWidth = 2.5
  ctx.beginPath()
  ctx.moveTo(x0, y0)
  ctx.lineTo(x1, y1)
  ctx.stroke()

  const head = 7
  const angle = Math.atan2(ny, nx)
  ctx.beginPath()
  ctx.moveTo(x1, y1)
  ctx.lineTo(
    x1 - head * Math.cos(angle - 0.45),
    y1 - head * Math.sin(angle - 0.45),
  )
  ctx.lineTo(
    x1 - head * Math.cos(angle + 0.45),
    y1 - head * Math.sin(angle + 0.45),
  )
  ctx.closePath()
  ctx.fill()
  ctx.restore()

  $vx.textContent = vx.toFixed(3)
  $vy.textContent = vy.toFixed(3)
  $speed.textContent = speed.toFixed(3)
  $hint.textContent = `θ ${((angle / TAU) * 360).toFixed(1)}°`
}

function fadeFrame() {
  ctx.fillStyle = `rgba(5, 5, 10, ${TRAIL_ALPHA})`
  ctx.fillRect(0, 0, width, height)
}

let last = performance.now()

function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000)
  last = now
  time += dt

  fadeFrame()

  for (const p of particles) {
    stepParticle(p, dt)
    drawParticle(p)
  }

  drawPointerArrow()
  requestAnimationFrame(frame)
}

window.addEventListener('resize', resize)
canvas.addEventListener('pointermove', (e) => {
  const rect = canvas.getBoundingClientRect()
  pointer.x = e.clientX - rect.left
  pointer.y = e.clientY - rect.top
  pointer.active = true
})
canvas.addEventListener('pointerleave', () => {
  pointer.active = false
  $vx.textContent = '—'
  $vy.textContent = '—'
  $speed.textContent = '—'
  $hint.textContent = 'Move pointer to probe the field'
})

resize()
requestAnimationFrame(frame)
</script>
</body>
</html>
